name = "matomo-tracker-worker"
main = "dist/index.js"
compatibility_date = "2024-12-08"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[dev]
port = 8787
local_protocol = "https"

[vars]
MATOMO_URL = "https://andrewprokos.com/matomo/"
MATOMO_SITE_ID = "1"
MATOMO_TIMEOUT_MS = "5000"
LOG_LEVEL = "warn"
USER_AGENT_ALLOWLIST_REGEX = "ChatGPT-User|MistralAI-User|Gemini-Deep-Research|Claude-User|Perplexity-User|Google-NotebookLM"
DOCUMENT_REGEX = "^[^?]+\\\\.(?:pdf|mp4?)(?:\\\\?|$)"
